name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Analiza el issue #${{ github.event.issue.number }} de este repositorio (un Tetris en JavaScript vanilla, ver CLAUDE.md para arquitectura).

            1. Asigna las labels apropiadas usando `gh issue edit ${{ github.event.issue.number }} --add-label "..."`
               (si una label necesaria no existe, créala primero con `gh label create`, p.ej. bug, enhancement, ui, gameplay, performance, question).
            2. Publica un comentario en el issue con `gh issue comment ${{ github.event.issue.number }}` que contenga
               un diagnóstico general del problema: causa probable, los archivos/funciones de game.js relevantes
               según CLAUDE.md, y una propuesta breve del enfoque de solución (sin implementarla todavía).
               El comentario debe estar escrito en formato Markdown válido para GitHub (encabezados, listas,
               bloques de código con triple backtick y referencias a archivos con backticks).
          claude_args: '--allowed-tools "Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label create:*),Bash(gh label list:*)"'
